<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend has been discontinued — Stoken Games</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="images/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --on-surface: #e1e2ee;
    --on-surface-variant: #c2c6d8;
    --text-primary: #ffffff;
    --stoken-blue-deep: #0066ff;
    --font-display: 'Barlow Condensed', system-ui, sans-serif;
    --font-body: 'Nunito', system-ui, sans-serif;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--on-surface);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  p {
    color: var(--on-surface-variant);
    margin-bottom: 16px;
    font-size: 17px;
  }

  .actions {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--stoken-blue-deep);
    color: #fff;
    padding: 16px 32px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    box-shadow: 0 0 30px rgba(0, 102, 255, 0.3);
    transition: filter 0.2s ease;
  }
  .btn-primary:hover { filter: brightness(1.12); }

  .secondary {
    color: rgba(201, 198, 197, 0.7);
    font-size: 14px;
    margin: 0;
  }
  .secondary a {
    color: var(--stoken-blue-deep);
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 102, 255, 0.4);
    padding-bottom: 1px;
    transition: border-color 0.2s ease;
  }
  .secondary a:hover { border-bottom-color: var(--stoken-blue-deep); }
</style>
</head>
<body>
  <main class="wrap">
    <h1>Blend has been discontinued</h1>
    <p>Stoken Games is no longer developing the Blend app. Spotify has released similar functionality natively in their app.</p>
    <p>Thanks to everyone who tried it.</p>
    <div class="actions">
      <a href="/" class="btn-primary">See what Stoken Games is working on now &rarr;</a>
      <p class="secondary">Or join the waitlist for our next app, <a href="/#apps">Kinterpret</a>.</p>
    </div>
  </main>
</body>
</html>
